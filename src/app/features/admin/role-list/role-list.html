<div class="page">
  <div class="page-header">
    <div>
      <h2>Roles & Permissions</h2>
      <p class="muted">Manage security roles for the system</p>
    </div>
    <button mat-flat-button color="primary" (click)="openNewRoleDialog()">
      <mat-icon>add</mat-icon> New Role
    </button>
  </div>

  <div class="filters">
    <mat-form-field appearance="outline">
      <mat-label>Role Name</mat-label>
      <input matInput (input)="applyFilter()" [(ngModel)]="filterName" placeholder="Filter by name..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  @if (loading()) { <mat-progress-bar mode="indeterminate"></mat-progress-bar> }

  <div class="table-card">
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
        <td mat-cell *matCellDef="let r">{{ r.id }}</td>
      </ng-container>
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Role Name</th>
        <td mat-cell *matCellDef="let r">
          <a class="cell-link" (click)="edit(r)">{{ r.name }}</a>
        </td>
      </ng-container>
      <ng-container matColumnDef="permissionCount">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Permissions</th>
        <td mat-cell *matCellDef="let r">
          <span class="perm-badge">{{ r.permissionIds?.length || 0 }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let r">
          <app-row-actions [actions]="rowActions" (actionClick)="onAction($event, r)"></app-row-actions>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      @if (dataSource.filteredData.length === 0) {
        <tr class="empty"><td [attr.colspan]="displayedColumns.length">No roles found</td></tr>
      }
    </table>
  </div>
</div>
