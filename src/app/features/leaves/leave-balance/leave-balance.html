<div class="page">
  <h2>My Leave Balance</h2>
  @if (loading()) { <mat-progress-bar mode="indeterminate"></mat-progress-bar> }
  @if (balance(); as b) {
    <div class="cards">
      <mat-card class="balance-card paid">
        <mat-icon>event_available</mat-icon>
        <div>
          <p class="label">Paid Leaves</p>
          <p class="value">{{ b.paidLeave }}</p>
        </div>
      </mat-card>
      <mat-card class="balance-card free">
        <mat-icon>card_giftcard</mat-icon>
        <div>
          <p class="label">Free Leaves</p>
          <p class="value">{{ b.freeLeave }}</p>
        </div>
      </mat-card>
      <mat-card class="balance-card short">
        <mat-icon>schedule</mat-icon>
        <div>
          <p class="label">Short Leaves</p>
          <p class="value">{{ b.shortLeave }}</p>
        </div>
      </mat-card>
    </div>
  }
</div>
