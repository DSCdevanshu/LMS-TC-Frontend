<div class="page">
  <div class="page-header">
    <div>
      <h2>Employee Directory</h2>
      <p class="muted">Search and browse employee contact information</p>
    </div>
  </div>

  @if (loading()) { <mat-progress-bar mode="indeterminate" /> }

  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>Search</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Name, email, department..." />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z1">
    <ng-container matColumnDef="empCode">
      <th mat-header-cell *matHeaderCellDef>Code</th>
      <td mat-cell *matCellDef="let row">{{ row?.empCode }}</td>
    </ng-container>
    <ng-container matColumnDef="empName">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let row">{{ row?.empName }}</td>
    </ng-container>
    <ng-container matColumnDef="emailID">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let row">{{ row?.emailID }}</td>
    </ng-container>
    <ng-container matColumnDef="departmentName">
      <th mat-header-cell *matHeaderCellDef>Department</th>
      <td mat-cell *matCellDef="let row">{{ row?.departmentName }}</td>
    </ng-container>
    <ng-container matColumnDef="designationName">
      <th mat-header-cell *matHeaderCellDef>Designation</th>
      <td mat-cell *matCellDef="let row">{{ row?.designationName }}</td>
    </ng-container>
    <ng-container matColumnDef="phoneNumber">
      <th mat-header-cell *matHeaderCellDef>Phone</th>
      <td mat-cell *matCellDef="let row">{{ row?.phoneNumber }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
