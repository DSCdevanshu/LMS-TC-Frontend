<div class="page">
  <div class="page-header">
    <div>
      <h2>Leave Types</h2>
      <p class="muted">View leave type configuration</p>
    </div>
  </div>

  @if (loading()) { <mat-progress-bar mode="indeterminate" /> }

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z1">
    <ng-container matColumnDef="leaveTypeName">
      <th mat-header-cell *matHeaderCellDef>Leave Type</th>
      <td mat-cell *matCellDef="let row">{{ row?.leaveTypeName }}</td>
    </ng-container>
    <ng-container matColumnDef="defaultDays">
      <th mat-header-cell *matHeaderCellDef>Default Days</th>
      <td mat-cell *matCellDef="let row">{{ row?.defaultDays }}</td>
    </ng-container>
    <ng-container matColumnDef="isCarryForward">
      <th mat-header-cell *matHeaderCellDef>Carry Forward</th>
      <td mat-cell *matCellDef="let row">{{ row?.isCarryForward ? 'Yes' : 'No' }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
