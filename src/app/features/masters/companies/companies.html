<div class="page">
  <div class="page-header">
    <div>
      <h2>Companies</h2>
      <p class="muted">Manage organisation companies</p>
    </div>
    <button mat-flat-button color="primary" (click)="openDialog()">
      <mat-icon>add</mat-icon> Add Company
    </button>
  </div>

  <div class="filters">
    <mat-form-field appearance="outline">
      <mat-label>Company Code</mat-label>
      <input matInput (input)="applyFilter()" [(ngModel)]="filterCode" placeholder="Filter by code..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Company Name</mat-label>
      <input matInput (input)="applyFilter()" [(ngModel)]="filterName" placeholder="Filter by name..." />
      <mat-icon matSuffix>search</mat-icon>
    </mat-form-field>
  </div>

  @if (loading()) { <mat-progress-bar mode="indeterminate"></mat-progress-bar> }

  <div class="table-card">
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="companyCode">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Code</th>
        <td mat-cell *matCellDef="let row">{{ row.companyCode || '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="companyName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Company Name</th>
        <td mat-cell *matCellDef="let row">{{ row.companyName }}</td>
      </ng-container>
      <ng-container matColumnDef="totalEmployees">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Total Employees</th>
        <td mat-cell *matCellDef="let row">{{ row.totalEmployees ?? 0 }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <app-row-actions [actions]="rowActions" (actionClick)="onAction($event, row)"></app-row-actions>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      @if (dataSource.filteredData.length === 0) {
        <tr class="empty"><td [attr.colspan]="displayedColumns.length">No companies found</td></tr>
      }
    </table>
  </div>
</div>
