<div class="page">
  <div class="page-header">
    <h2>Departments</h2>
  </div>

  <mat-card class="form-card">
    <mat-card-title>{{ editingId() ? 'Edit' : 'Add' }} Department</mat-card-title>
    <form [formGroup]="form" (ngSubmit)="save()" class="form-row">
      <mat-form-field appearance="outline">
        <mat-label>Code</mat-label>
        <input matInput formControlName="depCode" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Department Name</mat-label>
        <input matInput formControlName="departmentName" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>HOD</mat-label>
        <mat-select formControlName="hod">
          <mat-option [value]="0">— None —</mat-option>
          @for (e of employees(); track e.value) {
            <mat-option [value]="+e.value!">{{ e.text }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
      <div class="actions">
        <button mat-flat-button color="primary" type="submit">{{ editingId() ? 'Update' : 'Add' }}</button>
        @if (editingId()) {
          <button mat-stroked-button type="button" (click)="cancel()">Cancel</button>
        }
      </div>
    </form>
  </mat-card>

  @if (loading()) { <mat-progress-bar mode="indeterminate"></mat-progress-bar> }

  <div class="table-card">
    <table mat-table [dataSource]="dataSource">
      <ng-container matColumnDef="depCode">
        <th mat-header-cell *matHeaderCellDef>Code</th>
        <td mat-cell *matCellDef="let row">{{ row.depCode }}</td>
      </ng-container>
      <ng-container matColumnDef="departmentName">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let row">{{ row.departmentName }}</td>
      </ng-container>
      <ng-container matColumnDef="hod">
        <th mat-header-cell *matHeaderCellDef>HOD</th>
        <td mat-cell *matCellDef="let row">{{ row.hod }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" (click)="edit(row)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="remove(row)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>
  </div>
</div>
